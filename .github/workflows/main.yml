name: Quality gate check
on:
  push:
    branches: [main]
  pull_request:
    branches:
        - main
jobs:
    ci-jobs:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v2
            - name: install dependencies
              run: pip install -r requirements.txt
            - name: run test and enforced coverage
              run: 
                pytest --cov=calc  --cov-report=term
    cd-jobs:
        runs-on: ubuntu-latest
        needs: ci-jobs         
        steps:
            - name: Checkout code
              uses: actions/checkout@v2
            - name: print message
              run: echo "Deployment done......"

